  <text x="400" y="105" font-family="'Noto Sans KR', sans-serif" font-size="30" font-weight="800" fill="#ffffff" text-anchor="middle">Yumi의 첫 출근 🌸</text>
  <text x="400" y="135" font-family="'Noto Sans KR', sans-serif" font-size="15" fill="#e9d5ff" text-anchor="middle">Operations Manager | 2026.03.01</text>

