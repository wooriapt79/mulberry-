  <text x="400" y="950" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">🌿 Mulberry Project — 식품사막화 제로를 향해</text>
  <text x="400" y="972" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">#식품사막화 #뽕나무프로젝트 #인제군 #AI에이전트 #시니어케어</text>

