<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mulberry AI 글쓰기 마법사</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        /* 입력 영역 */
        .input-section {
            margin-bottom: 30px;
        }

        .input-label {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .input-label span {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 16px;
        }

        .input-box {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .input-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-hint {
            font-size: 14px;
            color: #999;
            margin-top: 8px;
        }

        /* 사진 업로드 */
        .photo-upload {
            margin-bottom: 30px;
        }

        .photo-preview {
            width: 100%;
            height: 200px;
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .photo-preview:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            text-align: center;
            color: #999;
        }

        .photo-placeholder .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        #photoInput {
            display: none;
        }

        /* AI 생성 버튼 */
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 30px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* 로딩 */
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 결과 */
        .result-section {
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .story-card {
            background: #f8f9ff;
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .story-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .story-card.selected {
            background: #667eea;
            color: white;
        }

        .story-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .story-text {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .story-card.selected .story-label,
        .story-card.selected .story-text {
            color: white;
        }

        .selected-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            color: #667eea;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: none;
        }

        .story-card.selected .selected-badge {
            display: block;
        }

        /* 포스팅 버튼 */
        .post-btn {
            width: 100%;
            padding: 18px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .post-btn:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }

        .post-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* 성공 메시지 */
        .success-message {
            background: #10b981;
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
            margin-top: 20px;
        }

        .success-message.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        /* 반응형 */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 24px;
            }

            .input-box {
                font-size: 16px;
            }

            .generate-btn, .post-btn {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌾 AI 글쓰기 마법사</h1>
            <p>간단한 키워드만 입력하세요!</p>
        </div>

        <div class="content">
            <!-- 1. 키워드 입력 -->
            <div class="input-section">
                <div class="input-label">
                    <span>1</span>
                    오늘 무엇을 하셨나요?
                </div>
                <textarea 
                    id="userInput" 
                    class="input-box" 
                    rows="3" 
                    placeholder="예: 배추 수확함, 날씨 좋음"
                ></textarea>
                <div class="input-hint">
                    💡 간단하게 적어주세요. AI가 멋진 글로 만들어드립니다!
                </div>
            </div>

            <!-- 2. 사진 업로드 -->
            <div class="photo-upload">
                <div class="input-label">
                    <span>2</span>
                    사진 추가 (선택)
                </div>
                <div class="photo-preview" onclick="document.getElementById('photoInput').click()">
                    <div class="photo-placeholder">
                        <div class="icon">📷</div>
                        <div>사진을 선택하세요</div>
                    </div>
                </div>
                <input type="file" id="photoInput" accept="image/*" capture="environment">
                <div class="input-hint">
                    💡 사진의 날짜와 위치 정보로 자동으로 글을 꾸며드립니다!
                </div>
            </div>

            <!-- 3. AI 생성 버튼 -->
            <button class="generate-btn" id="generateBtn">
                ✨ AI 마법 시작!
            </button>

            <!-- 로딩 -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>AI가 멋진 글을 만들고 있습니다...</div>
            </div>

            <!-- 결과 -->
            <div class="result-section" id="resultSection">
                <div class="input-label">
                    <span>3</span>
                    마음에 드는 글을 선택하세요
                </div>

                <div class="story-card" data-version="0">
                    <div class="selected-badge">선택됨 ✓</div>
                    <div class="story-label">버전 A - 따뜻한 일상</div>
                    <div class="story-text" id="storyA"></div>
                </div>

                <div class="story-card" data-version="1">
                    <div class="selected-badge">선택됨 ✓</div>
                    <div class="story-label">버전 B - 계절 감성</div>
                    <div class="story-text" id="storyB"></div>
                </div>

                <div class="story-card" data-version="2">
                    <div class="selected-badge">선택됨 ✓</div>
                    <div class="story-label">버전 C - 정성과 자부심</div>
                    <div class="story-text" id="storyC"></div>
                </div>

                <button class="post-btn" id="postBtn">
                    📢 SNS에 게시하기
                </button>

                <div class="success-message" id="successMessage">
                    <div class="success-icon">✅</div>
                    <h2>게시 완료!</h2>
                    <p>여러분의 이야기가 SNS에 공유되었습니다.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수
        let selectedVersion = 0;
        let photoMetadata = null;
        let generatedStories = null;

        // 사진 업로드 처리
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // 사진 미리보기
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.querySelector('.photo-preview');
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(file);

                // 메타데이터 추출 (EXIF)
                extractPhotoMetadata(file);
            }
        });

        // 사진 메타데이터 추출
        function extractPhotoMetadata(file) {
            // 실제로는 EXIF.js 라이브러리 사용
            // 여기서는 시뮬레이션
            const now = new Date();
            
            // 날씨 API 호출 (시뮬레이션)
            getWeatherData().then(weather => {
                photoMetadata = {
                    date: now.toISOString().split('T')[0],
                    location: "인제군 기린면",
                    weather: weather.condition,
                    temperature: weather.temperature
                };
                
                console.log('Photo metadata:', photoMetadata);
            });
        }

        // 날씨 데이터 가져오기 (시뮬레이션)
        async function getWeatherData() {
            // 실제로는 OpenWeatherMap API 사용
            // 여기서는 시뮬레이션
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve({
                        condition: "맑음",
                        temperature: "5°C"
                    });
                }, 500);
            });
        }

        // AI 생성 버튼
        document.getElementById('generateBtn').addEventListener('click', async function() {
            const userInput = document.getElementById('userInput').value.trim();
            
            if (!userInput) {
                alert('오늘 무엇을 하셨는지 간단하게 적어주세요!');
                return;
            }

            // 로딩 시작
            document.getElementById('loading').classList.add('active');
            this.disabled = true;

            try {
                // API 호출
                const response = await fetch('/api/senior-story/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_input: userInput,
                        farm_name: "푸른골농원",
                        farmer_name: "김철수",
                        photo_metadata: photoMetadata
                    })
                });

                const result = await response.json();

                if (result.success) {
                    generatedStories = result;
                    displayStories(result);
                } else {
                    alert('스토리 생성에 실패했습니다. 다시 시도해주세요.');
                }

            } catch (error) {
                console.error('Error:', error);
                alert('오류가 발생했습니다. 다시 시도해주세요.');
            } finally {
                // 로딩 종료
                document.getElementById('loading').classList.remove('active');
                this.disabled = false;
            }
        });

        // 스토리 표시
        function displayStories(result) {
            const stories = result.original_stories;
            
            document.getElementById('storyA').textContent = stories[0];
            document.getElementById('storyB').textContent = stories[1];
            document.getElementById('storyC').textContent = stories[2];

            // 결과 섹션 표시
            document.getElementById('resultSection').classList.add('active');

            // 스크롤
            document.getElementById('resultSection').scrollIntoView({ 
                behavior: 'smooth', 
                block: 'start' 
            });
        }

        // 스토리 선택
        document.querySelectorAll('.story-card').forEach(card => {
            card.addEventListener('click', function() {
                // 기존 선택 해제
                document.querySelectorAll('.story-card').forEach(c => {
                    c.classList.remove('selected');
                });

                // 새로운 선택
                this.classList.add('selected');
                selectedVersion = parseInt(this.dataset.version);
            });
        });

        // 첫 번째 스토리 기본 선택
        document.querySelector('.story-card[data-version="0"]').classList.add('selected');

        // 포스팅 버튼
        document.getElementById('postBtn').addEventListener('click', async function() {
            if (!generatedStories) {
                alert('먼저 AI로 글을 생성해주세요!');
                return;
            }

            this.disabled = true;

            try {
                const response = await fetch('/api/senior-story/post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_input: document.getElementById('userInput').value,
                        selected_version: selectedVersion,
                        farm_name: "푸른골농원",
                        farmer_name: "김철수",
                        photo_metadata: photoMetadata
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // 성공 메시지
                    document.getElementById('successMessage').classList.add('active');
                    
                    // 3초 후 초기화
                    setTimeout(() => {
                        location.reload();
                    }, 3000);
                } else {
                    alert('게시에 실패했습니다. 다시 시도해주세요.');
                    this.disabled = false;
                }

            } catch (error) {
                console.error('Error:', error);
                alert('오류가 발생했습니다. 다시 시도해주세요.');
                this.disabled = false;
            }
        });
    </script>
</body>
</html>
